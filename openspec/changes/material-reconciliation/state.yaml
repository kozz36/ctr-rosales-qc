post_sdd_gates:
  - visual e2e validation (Opus vision + Playwright MCP driving the running app) + review-then-fix subagent — BEFORE verify
  - judgment-day (blind dual adversarial review + fix + re-judge) BEFORE any further push
  - project CLAUDE.md (done at repo bootstrap)
  - public GitHub repo + MIT license (done at repo bootstrap)
