# docker-compose.yml — ctr-rosales-qc backend verification environment (r10 / D5)
#
# Cloud vision profile: provider=ollama → qwen3.5:397b-cloud via host Ollama daemon.
# SUNAT fetch: opt-in (enabled=true); cross-run cache at /data/sunat-cache (named volume).
# OCR: RapidOCR PP-OCRv5-server (deterministic, paddle-free, air-gap-capable).
#      Engine=rapidocr — quantities come from deterministic OCR (SDD#1 deploy flip).
#
# Prerequisites:
#   - make build (or docker compose build backend)
#   - Ollama host daemon running with qwen3.5:397b-cloud pulled
#   - PDF file present at the path bound below (read-only)
#
# Air-gap default is PRESERVED — the cloud + SUNAT profile is opt-in via this compose file.
# Running the backend directly (outside compose) uses its own defaults (provider=anthropic,
# sunat.enabled=false) — no cloud egress.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # `test` stage = runtime superset with pytest + tests/ for in-container
      # verification (CONT-S03/S12). Still paddle-free. Prod-lean image is the
      # default `runtime` target (build it explicitly with --target runtime).
      target: test
    image: ctr-backend:test
    # Host networking (Linux): the container shares the host net stack so it can
    # reach the host Ollama daemon bound to 127.0.0.1:11434 (host.docker.internal
    # via the bridge does NOT work — ollama listens on localhost only) AND egress
    # to SUNAT. `ports:` is incompatible with host mode (uvicorn binds host :8000
    # directly). Verified: ollama + SUNAT both HTTP 200 from a --network host run.
    network_mode: host
    # Bind uvicorn to ${CTR_BACKEND_PORT} (default 8010, OFF the conventional 8000)
    # so this host-mode container coexists with other host-mode services that bind
    # :8000 (e.g. a sibling project). Override via .env / shell: CTR_BACKEND_PORT=8000.
    command: uvicorn reconciliation.infrastructure.api.main:app --host 0.0.0.0 --port ${CTR_BACKEND_PORT:-8010}
    environment:
      # Backend URL for the in-container acceptance gate (make verify) — tracks the
      # bound port above so the test hits THIS backend, not a foreign host-port service.
      CTR_BACKEND_URL: "http://localhost:${CTR_BACKEND_PORT:-8010}"
      # OCR: RapidOCR PP-OCRv5-server — deterministic printed-table extraction (SDD#1)
      # Engine=rapidocr: ONNX, paddle-free, models bundled in image (air-gap-capable).
      # Replaces the prior OCR-disabled mode; SUNAT now acts as supplementary source.
      RECONCILIATION__OCR__ENABLED: "true"
      RECONCILIATION__OCR__ENGINE: "rapidocr"
      # Vision: cloud via host Ollama (host networking → localhost reaches the daemon)
      RECONCILIATION__VISION__PROVIDER: "ollama"
      # Model + base URL are env-configurable (12-factor) so each host can point at
      # its own Ollama port / model without editing this file. Defaults assume the
      # standard Ollama port (11434) and the cloud model. Override via .env or shell:
      #   OLLAMA_BASE_URL=http://localhost:11435/v1   (this host binds 11435)
      #   OLLAMA_MODEL=qwen3.5:9b                      (local-vision fallback)
      # Default kimi-k2.5 (83.1% on the #40 vision eval > qwen3.5:397b 76.9%). The
      # `:cloud` suffix is the LOCAL-PROXY form (localhost:11434 resolves it via the host
      # daemon's own ollama.com auth — no key needed). For DIRECT cloud, override .env:
      # OLLAMA_BASE_URL=https://ollama.com/v1 + OLLAMA_MODEL=kimi-k2.5 (no suffix) + OLLAMA_API_KEY.
      RECONCILIATION__VISION__OLLAMA__MODEL: "${OLLAMA_MODEL:-kimi-k2.5:cloud}"
      RECONCILIATION__VISION__OLLAMA__BASE_URL: "${OLLAMA_BASE_URL:-http://localhost:11434/v1}"
      # Ollama API key — env-only secret (never committed), passed through from .env.
      # EMPTY for the local proxy (localhost:11434, no auth → factory falls back to the
      # "ollama" placeholder). REQUIRED for direct Ollama Cloud (base_url=https://ollama.com/v1,
      # model WITHOUT the -cloud suffix, e.g. qwen3.5:397b): the SDK sends it as
      # `Authorization: Bearer <key>`. Retrieve with `secret-tool lookup service ollama-cloud account api`.
      RECONCILIATION__VISION__OLLAMA__API_KEY: "${OLLAMA_API_KEY:-}"
      # deadline_s: 60 (NOT the 20s code default). Cloud Ollama (qwen3.5:397b-cloud /
      # kimi-k2.5:cloud) is throttled under sequential reprocess; at 20s, 108/126 guía
      # date-reads timed out (#57) → dates fell to the R9b SUNAT floor instead of a real
      # read, degrading fecha-divergence detection. 60s gives the cloud call room.
      RECONCILIATION__VISION__DEADLINE_S: "60"
      # max_tokens: 640 sits in the 512-768 range — survives the <think> phase
      RECONCILIATION__VISION__MAX_TOKENS: "640"
      # disable_thinking: default ON — /no_think improves OCR/vision capture quality
      # and removes the ~12s/call qwen3.5 thinking phase. Set "false" to re-enable <think>.
      RECONCILIATION__VISION__DISABLE_THINKING: "true"
      # Protocolo crop: calibrated (0.60,0.14,1.00,0.22) — targets Registro N° + Fecha rows only.
      # Excludes printed template revision date (Rev:02 Fecha:08/09/2025). R10.9 calibrated.
      RECONCILIATION__VISION__PROTOCOLO_CROP__X0: "0.60"
      RECONCILIATION__VISION__PROTOCOLO_CROP__Y0: "0.14"
      RECONCILIATION__VISION__PROTOCOLO_CROP__X1: "1.00"
      RECONCILIATION__VISION__PROTOCOLO_CROP__Y1: "0.22"
      # SUNAT: enabled with cross-run cache (stable named volume)
      RECONCILIATION__SUNAT__ENABLED: "true"
      RECONCILIATION__SUNAT__CACHE: "true"
      RECONCILIATION__SUNAT__CACHE_DIR: "/data/sunat-cache"
      # Output: named volume for run results
      RECONCILIATION__OUTPUT_DIR: "/data/runs"
    volumes:
      # Real PDF: read-only bind-mount (input PDF must not be modified)
      - "/data/Projects/ctr-rosales-qc/Informe de detalle del formulario-202606020255.pdf:/data/input.pdf:ro"
      # Run output: named volume (persistent across compose up/down)
      - run-output:/data/runs
      # SUNAT cache: stable cross-run named volume (D4 CONT-S10)
      - sunat-cache:/data/sunat-cache
    healthcheck:
      # TCP connect to the bound port (mirrors docker-compose.app.yml). The prior
      # check hit /health — a route that does not exist (404 → urlopen raises →
      # container never healthy). Socket-connect just asserts uvicorn is listening.
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', ${CTR_BACKEND_PORT:-8010}), timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # frontend: DEFERRED — frontend tree absent from this branch (feat/rev2-identity-domain)
  # Uncomment when frontend/ lands on this branch.
  # frontend:
  #   profiles: [ui]
  #   build: { context: ./frontend }
  #   ports: ["5173:5173"]

volumes:
  run-output:
  sunat-cache:
