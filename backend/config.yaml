# config.yaml — CTR Rosales QC reconciliation pipeline
#
# Secrets (api_key) MUST be set via environment variables, NOT in this file.
# Environment variables always override values set here.
#
# Env var format: RECONCILIATION__<SECTION>__<KEY>
# Example:        RECONCILIATION__VISION__PROVIDER=ollama
#                 ANTHROPIC_API_KEY=sk-ant-...
#                 OPENAI_API_KEY=sk-...

vision:
  # Provider selection: anthropic | openai | ollama
  provider: anthropic

  # Per-provider settings (api_key injected from env, never here)
  anthropic:
    model: claude-3-5-sonnet-20241022

  openai:
    model: gpt-4o

  ollama:
    # qwen3.5:9b is the bake-off winner for local handwritten date reading (engram #2747)
    model: qwen3.5:9b
    base_url: http://localhost:11434/v1

  # Hard cap on vision LLM calls per run.
  # VisionCapExceededError is raised when this limit is reached.
  max_vision_calls: 500

  # Rev-3 D4 (EXT-020): stamp-region crop box for the VisionLLM date-extraction call.
  # Fractional coordinates (0.0–1.0) relative to the rendered page dimensions.
  # Default targets the lower-right quadrant where the CTR "Recibí conforme" stamp lives.
  # Set all values to 0.0 to disable Option A and fall back to Option B (>=300dpi full page).
  stamp_crop:
    x0: 0.5
    y0: 0.6
    x1: 1.0
    y1: 1.0

  # Rev-3 D4 Option B: DPI for full-page render when stamp_crop is disabled.
  fallback_dpi: 300

deskew:
  # Locked: guia_only — deskew is applied only to GUIA pages post-classification.
  # Do not change this value without amending the spec (EXT-003).
  scope: guia_only

confidence:
  # Locked at 0.85 — EXT-002. Values below this threshold are flagged for review.
  # Do not change this value without amending the spec.
  threshold: 0.85

# Base directory for per-run output directories (relative to working directory).
output_dir: runs

# Rev-3 D3 (EXT-023): SUNAT descargaqr opt-in fetch — OFF BY DEFAULT.
# This is the ONLY network egress in the system.  Enabling it breaks the air-gap.
# Document in docs/DECISIONS.md when you enable this in a committed config.
#
# To enable (e.g. for a connected-network run):
#   RECONCILIATION__SUNAT__ENABLED=true
# or set enabled: true in a local override (NOT committed).
sunat:
  enabled: false
  timeout_s: 10.0
  cache: true
