# nginx config for the CTR Rosales QC frontend container.
# Serves the Vite SPA with history-fallback and reverse-proxies /api to the
# backend service over the compose bridge network.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Large scanned PDFs (the upload UI allows up to 100 MB).
    client_max_body_size 100M;

    # API reverse proxy. No trailing slash on proxy_pass so the original
    # /api/v1/... URI is preserved (backend routes live under /api/v1).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SUNAT fetch + pipeline can run for minutes — keep the upstream alive.
        proxy_connect_timeout 30s;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }

    # SPA history fallback — every non-file route resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
